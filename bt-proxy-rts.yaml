---
substitutions:
  name: "bt-proxy-rts"
  friendly_name: BT_Proxy_RTS
  # On vient piocher dans nodes.yaml
  <<: !include common/nodes.yaml
  
esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: ${node_c6_lcd.board}
  variant: ${node_c6_lcd.variant}
  flash_size: 4MB
  framework:
    type: esp-idf

external_components:
  - source: github://NicoIIT/esphome-ble_adv_proxy@1da7d0758a52f7a67250d2576977e11a094a4313
  - source: github://dguihal/somfy_cover@master
    components: [somfy_cover]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "ESP BT Proxy Hotspot"
    password: !secret esphome_ap_password

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key
  custom_services: true
  homeassistant_services: true
  id: api_apiserver
  reboot_timeout: 15min

ota:
  - platform: esphome
    password: !secret esphome_ota_password

# Enable logging
logger:
  level: WARN

mdns:

web_server:
  port: 80
  # Optional: Customize the appearance or functionality
  version: 3 # Use version 3 for HA-Styling and sorting groups
  local: true # Include supporting JavaScript locally for offline access

#### Sensors
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 30s
    entity_category: diagnostic
    filters:
      - throttle: 10min
  - platform: uptime
    type: seconds
    name: Uptime Sensor
    entity_category: diagnostic
    update_interval: 60s
    filters:
      - throttle: 600s
  - platform: ble_rssi
    mac_address: !secret mantra_fan_ble_address
    name: "Mantra Fan"
    entity_category: diagnostic
    filters:
      - throttle: 10min
  - platform: ble_rssi
    mac_address: !secret magic_lantern_light_ble_address
    name: "Magic Lantern light"
    entity_category: diagnostic
    filters:
      - throttle: 10min

text_sensor:
  - platform: template
    id: somfy_rx_last
    name: "Detected Somfy Remote"

# --- Backlight: BL is on GPIO22 via transistor on this board ---
output:
  - platform: ledc
    pin: GPIO22  # LCD_BL
    id: lcd_bl

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: lcd_bl
    restore_mode: RESTORE_DEFAULT_OFF  # turn BL off at boot

#### BT Proxy
ble_adv_proxy:
  use_max_tx_power: true # see below, remove in case of build issues

bluetooth_proxy:
  active: true

#### Somfy RTS
spi:
  clk_pin: GPIO18   # Pin 5 CC1101 (SCK)
  mosi_pin: GPIO19  # Pin 6 CC1101 (MOSI)
  miso_pin: GPIO20  # Pin 7 CC1101 (MISO)

cc1101:
  id: my_cc1101
  frequency: 433.42MHz
  cs_pin: GPIO02    # Pin 4 CC1101 (CSN)

remote_transmitter:
  pin:
    number: GPIO05  # Pin 3 CC1101 (GD00)
    mode:
      output: true
  id: transmitter_somfy
  non_blocking: true
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.begin_rx

remote_receiver:
  pin: GPIO13       # Pin 8 CC1101 (GD02)
  id: receiver_somfy

cover:
  - platform: somfy_cover
    id: baie_salon
    name: "Volet salon"
    device_class: shutter
    open_duration: 30s   # A tuner
    close_duration: 30s  # A tuner
 
    storage_key: !secret transmitter_remote_id
 
    # The transmitter identity for this ESPHome device (hex)
    remote_code: !secret transmitter_baie_salon_remote_id
 
    prog_button: program_livingroom_door
    remote_transmitter: transmitter_somfy
    remote_receiver: receiver_somfy
 
    # Always updated on successful decode (use this to learn remotes)
    detected_remote: somfy_rx_last
 
    # Physical remotes that should be allowed to sync/control this cover
    allowed_remotes:
      - !secret baie_salon_physical_remote_id_1

button:
  - platform: template
    id: program_livingroom_door
    name: "Prog Volet salon"
    entity_category: config
