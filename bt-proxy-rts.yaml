---
substitutions:
  name: "bt-proxy-rts"
  friendly_name: BT_Proxy_RTS
  spi_clk_gpio: "GPIO18"            # CC1101 SCK (Pin 5)
  spi_mosi_gpio: "GPIO19"           # CC1101 MOSI (Pin 6)
  spi_miso_gpio: "GPIO20"           # CC1101 MISO (Pin 7)
  cc1101_cs_gpio: "GPIO02"          # CC1101 CSN (Pin 4)
  cc1101_transmitter_gpio: "GPIO05" # CC1101 GDO0 (Pin 3)
  cc1101_receiver_gpio: "GPIO23"    # CC1101 GDO2 (Pin 8)
  <<: !include common/nodes.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: ${node_c6.board}
  variant: ${node_c6.variant}
  flash_size: 4MB
  framework:
    type: esp-idf

external_components:
  - source: github://NicoIIT/esphome-ble_adv_proxy@a391b461a2c676b797af9540453ab7f02d978be8
  - source: github://dguihal/somfy_cover@8d43a8ec5243a736bf333a04e5bb5f7526c64538
    components: [somfy]

<<: !include common/base.yaml

# Enable logging
logger:
  level: INFO # Set to Debug to discover remotes

#### Sensors
sensor:
  - platform: wifi_signal
    name: WiFi Signal
    update_interval: 30s
    entity_category: diagnostic
    filters:
      - throttle: 10min
  - platform: uptime
    type: seconds
    name: Uptime Sensor
    entity_category: diagnostic
    update_interval: 60s
    filters:
      - throttle: 600s
  - platform: ble_rssi
    mac_address: !secret mantra_fan_ble_address
    name: "Mantra Fan"
    entity_category: diagnostic
    filters:
      - throttle: 10min
  - platform: ble_rssi
    mac_address: !secret magic_lantern_light_ble_address
    name: "Magic Lantern light"
    entity_category: diagnostic
    filters:
      - throttle: 10min

text_sensor:
  - platform: template
    id: somfy_rx_last
    name: "Detected Somfy Remote"

button:
  - platform: template
    id: program_livingroom_door
    name: "Prog Volet salon"
    entity_category: config

# --- Backlight: BL is on GPIO22 via transistor on this board ---
output:
  - platform: ledc
    pin: GPIO22  # LCD_BL
    id: lcd_bl

light:
  - platform: monochromatic
    id: lcd_backlight
    name: "LCD Backlight"
    output: lcd_bl
    restore_mode: RESTORE_DEFAULT_OFF  # turn BL off at boot

#### BT Proxy
ble_adv_proxy:
  use_max_tx_power: true # see below, remove in case of build issues

bluetooth_proxy:
  active: true

#### Somfy RTS
spi:
  clk_pin: ${spi_clk_gpio}
  mosi_pin: ${spi_mosi_gpio}
  miso_pin: ${spi_miso_gpio}

cc1101:
  id: my_cc1101
  frequency: 433.42MHz
  cs_pin: ${cc1101_cs_gpio}

remote_transmitter:
  pin:
    number: ${cc1101_transmitter_gpio}
    mode:
      output: true
  id: transmitter_somfy
  non_blocking: true
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.begin_rx

remote_receiver:
  pin: ${cc1101_receiver_gpio}
  id: receiver_somfy

somfy:
  - id: rts_radio
    type: rts
    remote_transmitter: transmitter_somfy
    remote_receiver: receiver_somfy

cover:
  - platform: somfy_cover
    id: baie_salon
    name: "Volet salon"
    device_class: shutter
    open_duration: 30s   # A tuner
    close_duration: 30s  # A tuner
    somfy_id: rts_radio

    storage_key: !secret transmitter_baie_salon_storage_key # For rolling code

    # The transmitter identity for this ESPHome device (hex)
    remote_code: !secret transmitter_baie_salon_remote_id

    prog_button: program_livingroom_door
    # Always updated on successful decode (used to learn remotes)
    detected_remote: somfy_rx_last
    # Physical remotes that should be allowed to sync/control this cover
    allowed_remotes:
      - !secret baie_salon_physical_remote_id_1
