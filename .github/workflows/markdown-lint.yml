name: Lint Markdown

on: [push, pull_request]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run markdownlint
        uses: davidanson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint-cli2.yaml
          globs: |
            **/*.md
